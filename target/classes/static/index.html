<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Reactivo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    select, input, button {
      padding: 10px;
      font-size: 16px;
    }

    #chat {
      border: 1px solid #ccc;
      background: white;
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .yo {
      background: #dcf8c6;
      margin-left: auto;
      text-align: right;
    }

    .otro {
      background: #eeeeee;
      margin-right: auto;
      text-align: left;
    }

    .barra-envio {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    #contenido {
      flex: 1;
    }

    .estado {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Chat Reactivo</h1>

  <div class="topbar">
    <label for="miUsuario">Mi usuario:</label>
    <select id="miUsuario"></select>

    <label for="otroUsuario">Hablar con:</label>
    <select id="otroUsuario"></select>
  </div>

  <div class="barra-envio">
    <input type="text" id="contenido" placeholder="Escribe un mensaje" />
    <button onclick="enviarMensaje()">Enviar</button>
  </div>

  <div class="estado" id="estado">Cargando usuarios...</div>

  <div id="chat"></div>

  <script>
    let usuarios = [];
    let source = null;

    window.onload = async function () {
      await cargarUsuarios();

      document.getElementById('miUsuario').addEventListener('change', intentarAbrirChatAutomatico);
      document.getElementById('otroUsuario').addEventListener('change', intentarAbrirChatAutomatico);

      intentarAbrirChatAutomatico();
    };

    async function cargarUsuarios() {
      try {
        const res = await fetch('/api/usuarios');
        usuarios = await res.json();

        const miUsuario = document.getElementById('miUsuario');
        const otroUsuario = document.getElementById('otroUsuario');

        miUsuario.innerHTML = '';
        otroUsuario.innerHTML = '';

        usuarios.forEach(u => {
          miUsuario.innerHTML += `<option value="${u.id}">${u.username}</option>`;
          otroUsuario.innerHTML += `<option value="${u.id}">${u.username}</option>`;
        });

        if (usuarios.length >= 2) {
          miUsuario.selectedIndex = 0;
          otroUsuario.selectedIndex = 1;
        }

        document.getElementById('estado').innerText =
          'Usuarios cargados. El chat se abrirá automáticamente.';
      } catch (e) {
        document.getElementById('estado').innerText = 'Error cargando usuarios.';
        console.error(e);
      }
    }

    function getNombrePorId(id) {
      const user = usuarios.find(u => u.id === id);
      return user ? user.username : id;
    }

    function intentarAbrirChatAutomatico() {
      const usuario1 = document.getElementById('miUsuario').value;
      const usuario2 = document.getElementById('otroUsuario').value;

      if (usuario1 && usuario2 && usuario1 !== usuario2) {
        abrirChat();
      }
    }

    async function abrirChat() {
      const usuario1 = document.getElementById('miUsuario').value;
      const usuario2 = document.getElementById('otroUsuario').value;

      if (!usuario1 || !usuario2 || usuario1 === usuario2) {
        document.getElementById('estado').innerText =
          'Selecciona dos usuarios diferentes.';
        return;
      }

      try {
        const res = await fetch(`/api/mensajes?usuario1=${usuario1}&usuario2=${usuario2}`);
        const mensajes = await res.json();

        renderMensajes(mensajes);

        if (source) {
          source.close();
        }

        source = new EventSource(`/api/mensajes/stream/${usuario1}`);

        source.onmessage = (event) => {
          const mensaje = JSON.parse(event.data);

          const esDeEstaConversacion =
            (mensaje.remitenteId === usuario1 && mensaje.receptorId === usuario2) ||
            (mensaje.remitenteId === usuario2 && mensaje.receptorId === usuario1);

          if (esDeEstaConversacion) {
            agregarMensaje(mensaje);
          }
        };

        source.onerror = (error) => {
          console.error('Error SSE:', error);
        };

        document.getElementById('estado').innerText =
          `Chat abierto: ${getNombrePorId(usuario1)} ↔ ${getNombrePorId(usuario2)}`;
      } catch (e) {
        document.getElementById('estado').innerText = 'No se pudo abrir el chat';
        console.error(e);
      }
    }

    async function enviarMensaje() {
      const remitenteId = document.getElementById('miUsuario').value;
      const receptorId = document.getElementById('otroUsuario').value;
      const contenido = document.getElementById('contenido').value.trim();

      if (!remitenteId || !receptorId || remitenteId === receptorId) {
        alert('Selecciona dos usuarios diferentes');
        return;
      }

      if (!contenido) {
        return;
      }

      try {
        await fetch('/api/mensajes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ remitenteId, receptorId, contenido })
        });

        document.getElementById('contenido').value = '';
        document.getElementById('contenido').focus();
      } catch (e) {
        console.error(e);
      }
    }

    function renderMensajes(mensajes) {
      const chat = document.getElementById('chat');
      chat.innerHTML = '';
      mensajes.forEach(m => agregarMensaje(m));
      chat.scrollTop = chat.scrollHeight;
    }

    function agregarMensaje(mensaje) {
      const chat = document.getElementById('chat');
      const miId = document.getElementById('miUsuario').value;

      if (document.getElementById('msg-' + mensaje.id)) {
        return;
      }

      const div = document.createElement('div');
      div.id = 'msg-' + mensaje.id;
      div.className = 'msg ' + (mensaje.remitenteId === miId ? 'yo' : 'otro');

      div.innerHTML = `<strong>${getNombrePorId(mensaje.remitenteId)}</strong><br>${mensaje.contenido}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('contenido').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          enviarMensaje();
        }
      });
    });
  </script>
</body>
</html>
